name: CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: DockerHub Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Image Build
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-bot:latest \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-bot:${{ github.sha }} \
          .

      - name: Image Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-bot:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-bot:${{ github.sha }}
