version: "3.8"

services:
  weather-bot:
    image: dziecko500plus/forecast:latest
    container_name: forecast
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300
